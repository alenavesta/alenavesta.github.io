  .answer:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

    content: '•';
    position: absolute;
    left: 4px;
    color: var(--amber);

var app = document.getElementById('app');

function el(tag, cls, html) {
  var node = document.createElement(tag);
  if (cls) node.className = cls;
  if (html !== undefined) node.innerHTML = html;
  return node;
}

function render(node) {
  app.innerHTML = '';
  app.appendChild(node);
  window.scrollTo(0, 0);
}

function showIntro() {
  state = { branch: null, step: 0, answers: [] };
  var s = el('div', 'screen intro');
  var logo = el('div', 'logo-wrap');
  logo.innerHTML = '<img src="logo.svg" alt="">';
  s.appendChild(logo);
  s.appendChild(el('h1', null, INTRO.title));
  s.appendChild(el('p', null, INTRO.sub));
  var btn = el('button', 'cta', INTRO.button);
  btn.onclick = showFork;
  s.appendChild(btn);
  render(s);
}

function progressBlock(step) {
  var wrap = el('div', 'progress');
  wrap.appendChild(el('div', 'label', 'Вопрос ' + step + ' из ' + TOTAL_STEPS));
  var bar = el('div', 'bar');
  var fill = el('i');
  fill.style.width = Math.round(step / TOTAL_STEPS * 100) + '%';
  bar.appendChild(fill);
  wrap.appendChild(bar);
  return wrap;
}

function showFork() {
  var s = el('div', 'screen question');
  s.appendChild(progressBlock(1));
  s.appendChild(el('h2', null, FORK.question));
  if (FORK.sub) s.appendChild(el('p', 'fork-sub', FORK.sub));
  var list = el('div', 'answers');
  FORK.options.forEach(function (opt) {
    var b = el('button', 'answer answer-fork',
      '<span class="answer-title">' + opt.emoji + ' ' + opt.title + '</span>' +
      '<span class="answer-desc">' + opt.desc + '</span>');
    b.onclick = function () {
      b.classList.add('picked');
      state.branch = opt.branch;
      state.step = 0;
      state.answers = [];
      setTimeout(showQuestion, 180);
    };
    list.appendChild(b);
  });
  s.appendChild(list);
  render(s);
}

function showQuestion() {
  var branch = BRANCHES[state.branch];
  var qIndex = state.step;
  var item = branch.questions[qIndex];

  var s = el('div', 'screen question');
  s.appendChild(progressBlock(qIndex + 2));
  s.appendChild(el('h2', null, item.q));

  var list = el('div', 'answers');
  item.a.forEach(function (ans) {
    var b = el('button', 'answer', ans.label);
    b.onclick = function () {
      b.classList.add('picked');
      state.answers[qIndex] = ans.t;
      setTimeout(function () {
        if (qIndex + 1 < branch.questions.length) {
          state.step = qIndex + 1;
          showQuestion();
        } else {
          showCounting();
        }
      }, 180);
    };
    list.appendChild(b);
  });
  s.appendChild(list);

  var back = el('button', 'backlink', '← Назад');
  back.onclick = function () {
    if (qIndex === 0) { showFork(); }
    else { state.step = qIndex - 1; showQuestion(); }
  };
  s.appendChild(back);

  render(s);
}

function showCounting() {
  var s = el('div', 'screen counting');
  s.innerHTML = '<span class="moon">☾</span>Считаю твои ответы…';
  render(s);
  setTimeout(showResult, 1500);
}

function winnerType() {
  var score = { A: 0, B: 0, C: 0 };
  state.answers.forEach(function (t) { score[t]++; });
  var max = Math.max(score.A, score.B, score.C);
  var tied = ['A', 'B', 'C'].filter(function (t) { return score[t] === max; });
  if (tied.length === 1) return tied[0];
  /* Равенство: решает ответ на вопрос 6 («Закончи фразу»), самый прямой */
  var last = state.answers[state.answers.length - 1];
  return tied.indexOf(last) !== -1 ? last : tied[0];
}

function showResult() {
  var result = BRANCHES[state.branch].result;
  var insert = result.inserts[winnerType()];

  var s = el('div', 'screen result');
  var card = el('div', 'result-card');
  card.appendChild(el('div', 'eyebrow', 'Твой результат'));
  card.appendChild(el('h1', null, insert.title));

  function paras(x, parent) {
    (Array.isArray(x) ? x : [x]).forEach(function (p) { if (p) parent.appendChild(el('p', null, p)); });
  }

  if (insert.lead) {
    /* Индивидуальный формат: у каждого результата свой текст, без общих рамок (son, zdorovie) */
    paras(insert.lead, card);

    var ins = el('div', 'insert');
    ins.appendChild(el('div', 'insert-label', 'Твоё корневое убеждение'));
    paras(insert.belief, ins);
    card.appendChild(ins);

    if (insert.recognize && insert.recognize.length) {
      card.appendChild(el('p', 'recognize-lead', insert.recognizeLead || 'Скорее всего, ты замечала за собой:'));
      var ul = el('ul', 'recognize');
      insert.recognize.forEach(function (li) { ul.appendChild(el('li', null, li)); });
      card.appendChild(ul);
    }
    paras(insert.why, card);
    if (result.relief) paras(result.relief, card);
    if (result.sell) paras(result.sell, card);
    if (insert.close) paras(insert.close, card);
  } else {
    /* Старый формат: общие рамки frameStart/frameEnd + короткая вставка */
    result.frameStart.forEach(function (p) { card.appendChild(el('p', null, p)); });
    var ins2 = el('div', 'insert');
    ins2.appendChild(el('div', 'insert-label', 'Твоё корневое убеждение'));
    ins2.appendChild(el('p', null, insert.text));
    card.appendChild(ins2);
    result.frameEnd.forEach(function (p) { card.appendChild(el('p', null, p)); });
  }

  if (result.legal) card.appendChild(el('p', 'legal', result.legal));
  s.appendChild(card);

  var cta = el('a', 'cta', result.cta);
  cta.href = LANDING_URL + '?theme=' + result.theme;
  s.appendChild(cta);
  s.appendChild(el('div', 'cta-note', 'Медитации, аффирмации и сублиминалы по твоей теме. Наборы от 500 ₽'));

  var again = el('button', 'restart', 'Пройти тест ещё раз');
  again.onclick = showIntro;
  s.appendChild(again);

  render(s);
}

showIntro();
</script>
</body>
</html>
